<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .auth-logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .auth-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        .auth-sub {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .form-group { margin-bottom: 1.1rem; }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.35rem;
        }

        .form-control {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-control:focus { border-color: var(--primary); }
        .form-control::placeholder { color: #bbb; }

        .submit-btn {
            width: 100%;
            padding: 0.65rem;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        .submit-btn:hover { background: var(--primary-hover); }

        .error-box {
            display: none;
            padding: 0.65rem 0.9rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius);
            color: var(--danger);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
        }

        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { font-size: 0.8rem; color: var(--text-muted); }

        .auth-footer {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">🏠 ChennaiRooms</a>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-sub">Sign in to find your perfect roommate</p>
        </div>

        <div id="error-msg" class="error-box"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" required class="form-control" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" required class="form-control" placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">New here?</div>
            <div class="divider-line"></div>
        </div>

        <p class="auth-footer">Don't have an account? <a href="signup.html">Create Account</a></p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            try {
                const response = await auth.login({ email, password });
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
