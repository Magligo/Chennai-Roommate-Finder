<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Rooms | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        .page-wrap { padding: 30px 0 60px; }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar input {
            padding: 0.55rem 0.9rem;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-bar input::placeholder { color: #aaa; }
        .filter-bar input:focus { border-color: var(--primary); }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .room-card {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .room-img {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .room-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rent-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.3rem 0.75rem;
            border-radius: 50px;
        }

        .room-body { padding: 1rem 1.1rem 1.1rem; }

        .room-location {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .room-type {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .room-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0.6rem 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .amenity-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.9rem;
        }

        .amenity-tag {
            background: #f0f4ff;
            color: var(--primary);
            border: 1px solid #c7d2fe;
            padding: 0.15rem 0.55rem;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 500;
        }

        .card-actions { display: flex; gap: 0.5rem; }

        .msg-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 0.875rem;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }

        .msg-btn:hover { background: var(--primary-hover); }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.35);
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.3rem;
            line-height: 1;
        }

        .modal-close:hover { color: var(--text); }

        .modal-textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .modal-textarea::placeholder { color: #aaa; }
        .modal-textarea:focus { border-color: var(--primary); }

        .modal-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <nav class="glow-nav">
        <div class="glow-nav-inner">
            <a href="index.html" class="glow-logo">🏠 ChennaiRooms</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="content-wrap">
            <div class="page-header">
                <div>
                    <h1 class="glow-title" style="font-size:1.75rem;">Available Rooms</h1>
                    <p class="glow-subtitle" style="font-size:0.9rem;">Find your next home and roommate in Chennai.</p>
                </div>
                <div class="filter-bar">
                    <input type="text" id="filter-location" placeholder="📍 Location (e.g. OMR)">
                    <input type="number" id="filter-rent" placeholder="₹ Max Rent" style="width:120px;">
                    <button onclick="loadRooms()" class="btn-glow-purple" style="padding:0.55rem 1.1rem;">Search</button>
                </div>
            </div>

            <div id="rooms-grid" class="rooms-grid">
                <div style="grid-column:1/-1;text-align:center;padding:4rem 0;color:var(--text-muted);">
                    Loading rooms...
                </div>
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="message-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <div>
                    <div class="modal-title">💬 Message Owner</div>
                    <div id="modal-room-name" style="font-size:0.82rem;color:var(--text-muted);margin-top:0.2rem;"></div>
                </div>
                <button class="modal-close" onclick="closeMessageModal()">×</button>
            </div>
            <label class="glow-label">Your Message</label>
            <textarea id="initial-msg" rows="4" class="modal-textarea"
                placeholder="Hi, I'm interested in this room! Is it still available?"></textarea>
            <div class="modal-actions">
                <button onclick="closeMessageModal()" class="btn-outline" style="flex:1;">Cancel</button>
                <button onclick="sendInitialMessage()" class="btn-glow-purple" style="flex:1;">Send Message</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadRooms());

        async function loadRooms() {
            const grid = document.getElementById('rooms-grid');
            const loc = document.getElementById('filter-location').value;
            const rent = document.getElementById('filter-rent').value;
            let params = new URLSearchParams();
            if (loc) params.append('location', loc);
            if (rent) params.append('maxRent', rent);
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const allRooms = await rooms.getAll(params.toString());
                if (allRooms.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem 0;color:var(--text-muted);">No rooms found matching your criteria.</div>';
                    return;
                }
                grid.innerHTML = allRooms.map(room => `
                    <div class="room-card">
                        <div class="room-img">
                            <img src="${room.image_url || 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'}"
                                alt="Room" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'">
                            <div class="rent-badge">₹${room.rent}/mo</div>
                        </div>
                        <div class="room-body">
                            <div class="room-location">📍 ${room.location}</div>
                            <div class="room-type">${room.room_type} · ${room.roommates_needed} roommate(s) needed</div>
                            <p class="room-desc">${room.description || 'No description provided.'}</p>
                            <div class="amenity-wrap">
                                ${(room.amenities || '').split(',').map(a => `<span class="amenity-tag">${a.trim()}</span>`).join('')}
                            </div>
                            <div class="card-actions">
                                <button class="msg-btn" onclick="openMessageModal(${room.room_id}, ${room.user_id}, '${room.location.replace(/'/g, "\\'")}')">
                                    💬 Message Owner
                                </button>
                                ${user && user.id === room.user_id ? `
                                <button onclick="deleteRoom(${room.room_id})" class="btn-danger" style="padding:0.6rem 1rem;">🗑️</button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem 0;color:var(--danger);">⚠️ ${err.message}</div>`;
            }
        }

        let currentRoomId = null, currentOwnerId = null;

        function openMessageModal(roomId, ownerId, location) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { alert('Please login to message owners.'); window.location.href = 'login.html'; return; }
            if (user.id === ownerId) { alert("You can't message yourself!"); return; }
            currentRoomId = roomId; currentOwnerId = ownerId;
            document.getElementById('modal-room-name').textContent = location;
            document.getElementById('message-modal').classList.add('open');
            document.getElementById('initial-msg').focus();
        }
        function closeMessageModal() {
            document.getElementById('message-modal').classList.remove('open');
            document.getElementById('initial-msg').value = '';
        }
        async function sendInitialMessage() {
            const text = document.getElementById('initial-msg').value.trim();
            if (!text) { alert('Please type a message first.'); return; }
            const btn = document.querySelector('#message-modal .btn-glow-purple');
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const token = localStorage.getItem('token');
                if (!user || !token) { alert('Your session has expired. Please log in again.'); window.location.href = 'login.html'; return; }
                const result = await apiRequest('/conversations/start', {
                    method: 'POST',
                    body: JSON.stringify({ receiver_id: currentOwnerId, room_id: currentRoomId })
                });
                const conversationId = result.conversationId;
                await messages.sendMessage(conversationId, text);
                window.location.href = `messages.html?conv=${conversationId}`;
            } catch (err) {
                if (err.message && err.message.toLowerCase().includes('failed to fetch')) {
                    alert('Cannot reach the server. Make sure the backend is running on port 5000.');
                } else { alert('Error sending message: ' + err.message); }
                btn.disabled = false; btn.textContent = 'Send Message';
            }
        }
    </script>
</body>

</html>
