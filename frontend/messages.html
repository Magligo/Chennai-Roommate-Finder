<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        .messages-layout { padding: 30px 0 40px; min-height: 100vh; }

        .messages-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .chat-container {
            display: flex;
            gap: 1rem;
            height: calc(100vh - 180px);
            min-height: 500px;
        }

        @media (max-width: 768px) {
            .chat-container { flex-direction: column; height: auto; min-height: unset; }
        }

        .conv-sidebar {
            width: 290px;
            flex-shrink: 0;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .conv-sidebar { width: 100%; height: 260px; }
        }

        .sidebar-head {
            padding: 0.85rem 1.1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
            background: #fafafa;
        }

        .conv-list { flex: 1; overflow-y: auto; }

        .conv-item {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        .conv-item:hover { background: #f8f8f8; }

        .conv-item.active {
            background: #eff6ff;
            border-left-color: var(--primary);
        }

        .conv-name { font-weight: 600; font-size: 0.875rem; color: var(--text); }
        .conv-room { font-size: 0.75rem; color: var(--primary); margin-top: 0.15rem; }

        .conv-preview {
            font-size: 0.775rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-badge {
            background: var(--primary);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: 50px;
        }

        .conv-empty {
            padding: 2.5rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .chat-panel { height: 450px; }
        }

        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 0.5rem;
            background: #fafafa;
        }

        .chat-view { display: none; flex-direction: column; height: 100%; }

        .chat-head {
            padding: 0.85rem 1.1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #fafafa;
        }

        .chat-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
        }

        .chat-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
        .chat-room-label { font-size: 0.8rem; color: var(--text-muted); }

        .chat-thread {
            flex: 1;
            overflow-y: auto;
            padding: 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: var(--bg);
        }

        .bubble-sent {
            align-self: flex-end;
            max-width: 70%;
            background: var(--primary);
            color: #fff;
            border-radius: 12px 12px 2px 12px;
            padding: 0.65rem 0.9rem;
        }

        .bubble-recv {
            align-self: flex-start;
            max-width: 70%;
            background: var(--paper);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px 12px 12px 2px;
            padding: 0.65rem 0.9rem;
        }

        .bubble-text { font-size: 0.9rem; line-height: 1.5; }
        .bubble-time { font-size: 0.72rem; margin-top: 0.3rem; text-align: right; opacity: 0.65; }

        .chat-input-area {
            padding: 0.85rem 1.1rem;
            border-top: 1px solid var(--border);
            background: var(--paper);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 0.65rem 0.9rem;
            background: #f9f9f9;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            max-height: 100px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .chat-input-area textarea:focus { border-color: var(--primary); }
    </style>
</head>

<body>
    <nav class="glow-nav">
        <div class="glow-nav-inner">
            <a href="index.html" class="glow-logo">🏠 ChennaiRooms</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="messages-layout content-wrap">
        <div class="messages-header">
            <div>
                <h1 style="font-size:1.5rem;font-weight:700;color:var(--text);">Messages</h1>
                <p style="color:var(--text-muted);font-size:0.875rem;margin-top:0.2rem;">Your conversations with room owners and seekers.</p>
            </div>
            <a href="rooms.html" class="btn-glow-purple">Find Rooms</a>
        </div>

        <div class="chat-container">
            <div class="conv-sidebar">
                <div class="sidebar-head">Inbox</div>
                <div class="conv-list" id="conv-list">
                    <div class="conv-empty" id="conv-empty">
                        <p style="font-size:1.5rem;margin-bottom:0.5rem;">💬</p>
                        <p style="font-weight:600;color:var(--text);margin-bottom:0.2rem;">No conversations yet</p>
                        <p>Message a room owner to start.</p>
                    </div>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-placeholder" id="chat-placeholder">
                    <p style="font-size:2rem;">💬</p>
                    <p style="font-weight:600;color:var(--text);">Select a conversation</p>
                    <p style="font-size:0.875rem;">to read and reply</p>
                </div>
                <div class="chat-view" id="chat-view">
                    <div class="chat-head">
                        <div class="chat-avatar" id="chat-avatar">?</div>
                        <div>
                            <div class="chat-name" id="chat-name">—</div>
                            <div class="chat-room-label" id="chat-room">—</div>
                        </div>
                    </div>
                    <div class="chat-thread" id="chat-thread"></div>
                    <div class="chat-input-area">
                        <textarea id="msg-input" rows="2" placeholder="Type your message…"></textarea>
                        <button id="send-btn" onclick="sendReply()" class="btn-glow-purple" style="flex-shrink:0;">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { window.location.href = 'login.html'; }

        let activeConvId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const openConvId = urlParams.get('conv');

        async function loadConversations() {
            try {
                const convs = await messages.getConversations();
                const list = document.getElementById('conv-list');
                const empty = document.getElementById('conv-empty');
                if (!convs || convs.length === 0) {
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                list.innerHTML = '';
                convs.forEach(c => {
                    const card = document.createElement('div');
                    card.id = `conv-${c.id}`;
                    card.className = 'conv-item';
                    card.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.15rem;">
                            <span class="conv-name">${c.other_user_name || 'User'}</span>
                            ${c.unread_count > 0 ? `<span class="conv-badge">${c.unread_count}</span>` : ''}
                        </div>
                        <div class="conv-room">📍 ${c.room_title || 'Room'}</div>
                        <div class="conv-preview">${c.last_message || 'No messages yet'}</div>
                    `;
                    card.onclick = () => openConversation(c);
                    list.appendChild(card);
                });
                if (openConvId) {
                    const target = convs.find(c => c.id == openConvId);
                    if (target) openConversation(target);
                }
            } catch (e) {
                console.error('Failed to load conversations:', e);
                const empty = document.getElementById('conv-empty');
                empty.style.display = 'block';
                empty.innerHTML = `<div class="conv-empty" style="color:var(--danger);"><p style="font-weight:600;margin-bottom:0.5rem;">Could not load</p><p>${e.message && e.message.toLowerCase().includes('failed to fetch') ? 'Backend not running on port 5000.' : e.message}</p></div>`;
            }
        }

        async function openConversation(conv) {
            activeConvId = conv.id;
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const card = document.getElementById(`conv-${conv.id}`);
            if (card) card.classList.add('active');

            document.getElementById('chat-avatar').textContent = (conv.other_user_name || 'U')[0].toUpperCase();
            document.getElementById('chat-name').textContent = conv.other_user_name || 'User';
            document.getElementById('chat-room').textContent = `📍 ${conv.room_title || 'Room'}`;

            document.getElementById('chat-placeholder').style.display = 'none';
            const cv = document.getElementById('chat-view');
            cv.style.display = 'flex';

            await fetchMessages(conv.id);
            messages.markRead(conv.id).catch(() => { });
        }

        async function fetchMessages(convId) {
            const thread = document.getElementById('chat-thread');
            thread.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:0.875rem;margin-top:2rem;">Loading messages...</p>';
            try {
                const msgs = await messages.getMessagesByConversation(convId);
                thread.innerHTML = '';
                if (!msgs || msgs.length === 0) {
                    thread.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:0.875rem;margin-top:2rem;">No messages yet. Say hello! 👋</p>';
                    return;
                }
                msgs.forEach(m => renderBubble(m, thread));
                thread.scrollTop = thread.scrollHeight;
            } catch (e) {
                thread.innerHTML = '<p style="text-align:center;color:var(--danger);font-size:0.875rem;margin-top:2rem;">Could not load messages.</p>';
            }
        }

        function renderBubble(m, thread) {
            const isMine = m.sender_id === user.id;
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.justifyContent = isMine ? 'flex-end' : 'flex-start';
            const time = new Date(m.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            wrapper.innerHTML = `
                <div class="${isMine ? 'bubble-sent' : 'bubble-recv'}">
                    <div class="bubble-text">${escapeHtml(m.message_text)}</div>
                    <div class="bubble-time">${time}</div>
                </div>
            `;
            thread.appendChild(wrapper);
        }

        async function sendReply() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeConvId) return;

            const btn = document.getElementById('send-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '...';

            try {
                await messages.sendMessage(activeConvId, text);
                input.value = '';
                btn.disabled = false;
                btn.innerHTML = originalContent;

                const thread = document.getElementById('chat-thread');
                if (thread.innerHTML.includes('No messages yet')) { thread.innerHTML = ''; }

                renderBubble({ sender_id: user.id, message_text: text, created_at: new Date().toISOString() }, thread);
                thread.scrollTop = thread.scrollHeight;
            } catch (e) {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                alert('Failed to send: ' + e.message);
            }
        }

        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
        });

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.addEventListener('DOMContentLoaded', loadConversations);
    </script>
</body>

</html>
