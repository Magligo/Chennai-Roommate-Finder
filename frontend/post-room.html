<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Room | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        .page-wrap { padding: 30px 0 60px; }

        .form-card {
            max-width: 640px;
            margin: 0 auto;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.1rem;
        }

        .full-col {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .error-box {
            display: none;
            padding: 0.65rem 0.9rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius);
            color: var(--danger);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        select.glow-input option { background: #fff; color: var(--text); }

        .upload-area {
            width: 100%;
            padding: 1.25rem;
            background: #fafafa;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .upload-area:hover { border-color: var(--primary); }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>
    <nav class="glow-nav">
        <div class="glow-nav-inner">
            <a href="index.html" class="glow-logo">⚡ ChennaiRooms</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="content-wrap">
            <div class="form-card">
                <div style="margin-bottom:2rem;">
                    <h1 class="glow-title" style="font-size:1.9rem;">🏠 Post a Room</h1>
                    <p class="glow-subtitle" style="font-size:0.9rem;">Fill in the details to find your next roommate.
                    </p>
                </div>

                <div id="error-msg" class="error-box"></div>

                <form id="post-room-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="glow-label">📍 Area / Location</label>
                            <input type="text" id="location" required class="glow-input"
                                placeholder="T Nagar, OMR, Velachery">
                        </div>
                        <div class="form-group">
                            <label class="glow-label">💰 Monthly Rent (₹)</label>
                            <input type="number" id="rent" required class="glow-input" placeholder="10000">
                        </div>
                        <div class="form-group">
                            <label class="glow-label">👥 Roommates Needed</label>
                            <input type="number" id="roommates_needed" required class="glow-input" placeholder="1">
                        </div>
                        <div class="form-group">
                            <label class="glow-label">🏡 Room Type</label>
                            <select id="room_type" class="glow-input">
                                <option value="1BHK">1BHK</option>
                                <option value="2BHK">2BHK</option>
                                <option value="3BHK">3BHK</option>
                                <option value="PG">PG</option>
                                <option value="Individual House">Individual House</option>
                            </select>
                        </div>
                        <div class="form-group full-col">
                            <label class="glow-label">✨ Amenities (comma separated)</label>
                            <input type="text" id="amenities" class="glow-input" placeholder="WiFi, AC, Parking, Gym">
                        </div>
                        <div class="form-group full-col">
                            <label class="glow-label">📝 Description</label>
                            <textarea id="description" rows="4" class="glow-input"
                                placeholder="Tell us more about the room and your expectations..."
                                style="resize:vertical;font-family:inherit;"></textarea>
                        </div>
                        <div class="form-group full-col">
                            <label class="glow-label">📷 Room Photo</label>
                            <label for="image" class="upload-area" id="upload-label">
                                <div style="font-size:2rem;margin-bottom:0.5rem;">📁</div>
                                <div id="upload-text">Click to upload room photo</div>
                                <div style="font-size:0.75rem;margin-top:0.3rem;">JPG, PNG, WEBP accepted</div>
                            </label>
                            <input type="file" id="image" accept="image/*" onchange="updateLabel(this)">
                        </div>
                        <div class="full-col" style="margin-top:0.5rem;">
                            <button type="submit" class="btn-glow-purple" style="width:100%;">🚀 Publish Room
                                Post</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        function updateLabel(input) {
            const label = document.getElementById('upload-text');
            if (input.files && input.files[0]) {
                label.textContent = '✅ ' + input.files[0].name;
            }
        }
        document.getElementById('post-room-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('location', document.getElementById('location').value);
            formData.append('rent', document.getElementById('rent').value);
            formData.append('roommates_needed', document.getElementById('roommates_needed').value);
            formData.append('room_type', document.getElementById('room_type').value);
            formData.append('amenities', document.getElementById('amenities').value);
            formData.append('description', document.getElementById('description').value);
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);
            const errorMsg = document.getElementById('error-msg');
            try {
                await rooms.post(formData);
                window.location.href = 'rooms.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
